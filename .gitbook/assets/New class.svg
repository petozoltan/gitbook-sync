@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Class1 <<Procedural>> {

<font color=black> procedure1(data) {\n     doSomething(\n             data.getData1(),\n             data.getData2()); \n }

..

<font color=black> procedure2() {\n }

}

class Class2 <<Procedural>> {

\n procedure3(data) {\n     doSomething(\n             data.getData1(),\n             data.getData2(),\n             data.getData3()); \n }\n

}

class Class3 <<Data>> {

<font color=mediumblue> data1;

<font color=mediumblue> data2;

..

<font color=black> getData1() \n
..

<font color=black> getData2()

}

class Class4 <<Data>> extends Class3 {

<font color=mediumblue> data3;

..

<font color=black> getData3()

}

Class1 .> Class3
Class2 .> Class4

@enduml

