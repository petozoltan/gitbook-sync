@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
borderThickness 1
}

skinparam arrow {
color gray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Database <<Database>> {
}

together {
}

together {
}

together {
Collector  -[hidden] Processor1
Processor1 -[hidden] Processor2
Processor2 -[hidden] Processor3
Processor3 -[hidden] Saver
}

Feature   <- -  Collector  : " 1."
Feature   <- -> Processor1 : "  2."
Feature   <- -> Processor2 : "  3."
Feature   <- -> Processor3 : "  4."
Feature   - ->  Saver      : " 5."
Saver     - ->  Database
Collector <- -  Database

@enduml

