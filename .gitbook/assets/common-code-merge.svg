@startuml

skinparam shadowing false


hide empty members
hide fields

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
fontColor white
borderThickness 1
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}




class U1 #lemonchiffon
class U2 #lemonchiffon
class U3 #lemonchiffon

class F1 #azure
class F2 #azure

package C1 {
class U1S1 as "S1"
class U1S2 as "S2"

class U2S1 as "S1"
class U2S2 as "S2"

class U3S1 as "S1"
class U3S2 as "S2"
}

class U1S3 as "S3"

class U1S4 as "S4"
class U2S4 as "S4"

U1   - -> U1S1
U1S1 - -> U1S2
U1S2 - -> U1S3
U1S3 - -> U1S4

U2    - -> U2S1
U2S1  - -> U2S2
U2S2 - - -> U2S4

U3    - -> U3S1
U3S1  - -> U3S2

U2S2 .> F1
U3S2 .> F1

U1S4 .> F2
U2S4 .> F2

note "Don't merge" as ND1
ND1 .. C1


note "Merge" as NM1
F1 . NM1

note "Merge" as NM2
F2 . NM2

@enduml

