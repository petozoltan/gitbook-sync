@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor lightgray
fontSize 12
fontStyle normal
fontColor gray
borderThickness 1
}

skinparam arrow {
color lightgray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Old {

class Data1 {
<font color=blue>attribute1
<font color=blue>attribute2
}
}

package New {

class Data4 extends Data1 {
<font color=blue>attribute1
<font color=blue>attribute2
..
attribute3
attribute4
}
}

Old - -> New : Copy

@enduml

