link Class1 to Class2--><!--MD5=[12bedf3c021a39ecdb38e50dfce94c88]
@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}

together {
class Class1 <<Procedural>> {

\n <font color=maroon>public</font> procedure1() \n

}

class Class2 <<Procedural>> {

\n <font color=maroon>public</font> procedure2() \n

}
}
class Class5 <<Procedural>> {

<font color=mediumblue> class1</font>;

<font color=mediumblue> class2</font>;

..
\n procedure3() {\n     <font color=mediumblue>class1</font>.procedure1();\n     <font color=mediumblue>class2</font>.procedure2(); \n }\n
}


Class1 - -o Class5
Class2 - -o Class5
Class1 -[hidden]- Class2

@enduml

