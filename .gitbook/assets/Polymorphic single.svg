@startuml

skinparam shadowing false


hide empty members
hide fields

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Parent {
\n common() {\n     method1();\n     method2(); \n }\n
..

<font color=maroon> abstract</font> method1()

<font color=maroon> abstract</font> method2() \n
}

class UseCase1 extends Parent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}

class UseCase2 extends Parent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}

note as N1
<font color=teal>// For each abstract method</font>

<font color=maroon> switch</font> (useCase) {
<font color=black> case</font> <font color=mediumblue>UC1</font>: ...
<font color=black> case</font> <font color=mediumblue>UC2</font>: ...
<font color=black> }
end note
Parent . N1

@enduml

