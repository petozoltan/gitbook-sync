@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor lightgray
fontSize 12
fontStyle normal
fontColor gray
borderThickness 1
}

skinparam arrow {
color lightgray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Old {

class Data1 {
<font color=blue>attribute1
attribute2
attribute3
}

class Data2 {
attribute4
<font color=blue>attribute5
attribute6
}

class Data3 {
attribute7
attribute8
<font color=blue>attribute9
}

Data1 - - Data2
Data1 - - Data3
}

package New {

class Data4 {
<font color=blue>attribute1
<font color=blue>attribute5
..
attribute10
attribute11
}

class Data5 {
<font color=blue>attribute9
..
attribute12
}

Data4 - - Data5
}

Old - -> New : Copy

@enduml

