@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
borderThickness 1
}

skinparam arrow {
color gray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Database <<Database>> {
}

together {
Class2 <- -> Class10 : Data
}

together {
Class3 <- -> Class4 : Data
Class4 <- -> Class5 : Data
Class5 <- -> Class6 : Data
}

together {
Class7 <- -> Class8 : Data
Class7 <- -> Class9 : Data
}

Class1 <- -> Class2 : Data
Class1 <- -> Class3 : Data
Class1 <- -> Class7 : Data

Class2  <- - - - -> Database : Data
Class3  <- -> Database : Data
Class4  <- -> Database : Data
Class5  <- -> Database : Data
Class6  <- -> Database : Data
Class7  <- - - - -> Database : Data
Class8  <- -> Database : Data
Class9  <- -> Database : Data
Class10 <- -> Database : Data

@enduml

