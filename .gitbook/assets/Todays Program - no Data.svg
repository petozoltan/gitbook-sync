@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
borderThickness 1
}

skinparam arrow {
color gray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Database <<Database>> {
}

together {
Class2 <- -> Class10
}

together {
Class3 <- -> Class4
Class4 <- -> Class5
Class5 <- -> Class6
}

together {
Class7 <- -> Class8
Class7 <- -> Class9
}

Class1 <- -> Class2
Class1 <- -> Class3
Class1 <- -> Class7

Class2  <- - - - -> Database
Class3  <- -> Database
Class4  <- -> Database
Class5  <- -> Database
Class6  <- -> Database
Class7  <- - - - -> Database
Class8  <- -> Database
Class9  <- -> Database
Class10 <- -> Database

@enduml

