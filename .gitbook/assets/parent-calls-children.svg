@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Class1 <<Procedural>> {
\n procedure1() {\n     procedure2();\n     procedure3(); \n }\n
..

<font color=maroon> abstract</font> procedure2()

<font color=maroon> abstract</font> procedure3() \n
}

class Class2 <<Procedural>> extends Class1 {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> procedure2()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> procedure3() \n

}

@enduml

