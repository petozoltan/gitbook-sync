@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}


class Class1 {

<strike><font color=black> procedure1() {\n<strike>     doSomething(); \n<strike> }\n
..

<font color=black> procedure2() {\n }

}

class Class2 extends Class1 {

\n<font color=teal> @Override\n procedure1() {\n     doSomethingElse(); \n }\n

}

@enduml

