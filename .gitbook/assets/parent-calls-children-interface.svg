@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Class1 <<Procedural>> {

\n procedure1(interface2) {\n     interface2.procedure2();\n     interface2.procedure3(); \n }\n

}

class Interface2 <<Interface>> {

\n <i>procedure2()
\n <i>procedure3() \n
}

class Class2 <<Procedural>> implements Interface2 {

\n <font color=teal>@Override</font>\n <font color=maroon>public</font> procedure2()

<font color=teal> @Override</font>\n <font color=maroon>public</font> procedure3() \n

}

Class1 -> Interface2

@enduml

