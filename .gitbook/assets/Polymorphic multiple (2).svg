@startuml

skinparam shadowing false


hide empty members
hide fields

hide circle


skinparam package {
style rectangle
backgroundColor white
borderColor white
borderThickness 1
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


package {

class AParent {
\n common() {\n     method1();\n     method2(); \n }\n
..

<font color=maroon> abstract</font> method1()

<font color=maroon> abstract</font> method2() \n
}

class AUseCase1 extends AParent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}

class AUseCase2 extends AParent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}
}

class A
A .[hidden] AParent
hide A

package {

class BParent {
\n common() {\n     method1();\n     method2(); \n }\n
..

<font color=maroon> abstract</font> method1()

<font color=maroon> abstract</font> method2() \n
}
AParent -> BParent
note on link
The same switches
in both hierarchies
end note

class BUseCase1 extends BParent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}

class BUseCase2 extends BParent {

\n <font color=teal>@Override</font>\n <font color=maroon>protected</font> method1()

<font color=teal> @Override</font>\n <font color=maroon>protected</font> method2() \n

}
}

class B
BParent .[hidden] B
hide B

@enduml

