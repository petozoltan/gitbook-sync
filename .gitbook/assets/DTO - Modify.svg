@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor lightgray
fontSize 12
fontStyle normal
fontColor gray
borderThickness 1
}

skinparam arrow {
color lightgray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Old {

class DataOld as "DataNew" {
<font color=black>attribute1
<font color=black>attribute2
..
<font color=lightgray>attribute3
<font color=lightgray>attribute4
}
}

package New {

class DataNew {
<font color=black>attribute1
<font color=black>attribute2
..
attribute3
attribute4
}
}

Old - -> New : Modify

@enduml

