link Class1 to Class3--><path d="M235.36,117 C245.31,117 255.27,117 265.23,117 " fill="none" id="Class1-&gt;Class3" style="stroke: #808080; stroke-width: 1.0; stroke-dasharray: 7.0,7.0;"/><polygon fill="#808080" points="270.43,117,261.43,113,265.43,117,261.43,121,270.43,117" style="stroke: #808080; stroke-width: 1.0;"/><!--MD5=[72fb8bd39d0ecadff8fe0fe3b8915a78]
@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Class1 <<Procedural>> {

<font color=black> procedure1(data) {\n     doSomething(\n             data.getData1(),\n             data.getData2()); \n }

..

<font color=black> procedure2() {\n }

}

class Class3 <<Data>> {

<font color=mediumblue> data1;

<font color=mediumblue> data2;

..

<font color=black> getData1() \n
..

<font color=black> getData2()

}

Class1 .> Class3

@enduml

