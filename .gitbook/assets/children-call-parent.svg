@startuml

skinparam shadowing false


hide empty members

hide circle



skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 12
stereotypeFontColor gray
stereotypeFontStyle normal
stereotypeFontName Consolas
}


class Class1 <<Procedural>> {

\n <font color=maroon>protected</font> procedure1() \n

}

class Class2 <<Procedural>> extends Class1 {

\n <font color=maroon>protected</font> procedure2() \n

}

class Class5 <<Procedural>> extends Class2 {

\n procedure3() {\n     procedure1();\n     procedure2(); \n }\n
}

@enduml

