@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
borderThickness 1
}

skinparam arrow {
color gray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}



package Database <<Database>> {
}

together {
}

together {
}

together {
Collector -[hidden] Processor
Processor -[hidden] Saver
}

Feature  <- -  Collector : " 1."
Feature  <- -> Processor : "  2."
Feature  - -> Saver : " 3."
Saver - -> Database
Collector <- - Database


@enduml

