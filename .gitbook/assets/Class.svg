@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor gray
fontSize 12
}

skinparam arrow {

color gray
}

skinparam class {

borderColor gray
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}


class Class {

<font color=mediumblue> data1;

<font color=mediumblue> data2;

..

<font color=black> procedure1() { </font>\n }

<font color=black> procedure2() {</font>\n }

}

@enduml

