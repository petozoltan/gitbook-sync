@startuml

skinparam shadowing false


hide empty members

hide circle


skinparam package {
style rectangle
borderColor white
fontSize 12
fontColor white
borderThickness 1
}

skinparam arrow {
color gray
fontColor gray
thickness 1
}

skinparam class {

borderColor black
borderThickness 1
backgroundColor white

fontSize 13
fontName Consolas

attributeFontSize 12
attributeFontName Consolas

stereotypeFontSize 11
}


package Hidden {
}

class Class1

Hidden <- -> Class1

@enduml

